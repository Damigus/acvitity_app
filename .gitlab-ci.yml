    - pytest --cov=. --cov-report=xml:coverage-activities.xml --junitxml=report-activities.xml tests/test_integration_activities.py
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage-activities.xml
      junit: backend/report-activities.xml

# build
frontend_build:
  stage: build
  image: node:20
  dependencies:
    - install_frontend_dependencies
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist

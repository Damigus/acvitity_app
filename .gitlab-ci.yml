services:
  - name: mongo:6
    alias: mongo

variables:
  MONGO_URI: mongodb://mongo:27017/testdb

stages:
  - install
  - test
  - build

# paczki
install_backend_dependencies:
  stage: install
  image: python:3.10
  script:
    - cd backend
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
  artifacts:
    paths:
      - backend/venv
    expire_in: 1h

install_frontend_dependencies:
  stage: install
  image: node:20
  script:
    - npm install
  artifacts:
    paths:
      - node_modules
    expire_in: 1h

# testy
test_unit_weather:
  stage: test
  image: python:3.10
  dependencies:
    - install_backend_dependencies
  script:
    - cd backend
    - source venv/bin/activate
    - pytest --cov=. --cov-report=xml:coverage-weather.xml --junitxml=report-weather.xml tests/test_unit_weather.py
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage-weather.xml
      junit: backend/report-weather.xml

test_mocked_db:
  stage: test
  image: python:3.10
  dependencies:
    - install_backend_dependencies
  script:
    - cd backend
    - source venv/bin/activate
    - pytest --cov=. --cov-report=xml:coverage-mocked.xml --junitxml=report-mocked.xml tests/test_mocked_db.py
